<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a8c1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a08520"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="128" cy="128" r="124" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <!-- Elegant serif P -->
  <text x="128" y="175" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="160" font-weight="bold" fill="white" font-style="italic">P</text>
  <!-- Subtle gold underline accent -->
  <line x1="80" y1="192" x2="176" y2="192" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
