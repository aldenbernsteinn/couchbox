<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
    user-select: none;
    -webkit-app-region: no-drag;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Voice overlay (top-right corner of screen) ──────────────── */
  #voice-overlay {
    position: fixed;
    top: 24px;
    right: 24px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    color: white;
    font-size: 15px;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 500px;
    background: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(30px) saturate(1.3);
    -webkit-backdrop-filter: blur(30px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  #voice-overlay.visible { opacity: 1; }
  #voice-overlay .text {
    white-space: pre-wrap;
    word-wrap: break-word;
    text-align: left;
  }
  .rec-dot { width: 8px; height: 8px; background: #f33; border-radius: 50%; animation: pulse 0.8s ease-in-out infinite; flex-shrink: 0; margin-top: 5px; }
  .cursor-blink { display: inline-block; width: 2px; height: 16px; background: #14b413; animation: blink 0.6s step-end infinite; flex-shrink: 0; vertical-align: text-bottom; }
  .voice-hint { font-size: 10px; color: rgba(255,255,255,0.35); flex-shrink: 0; white-space: nowrap; margin-top: 4px; }
  .writing-dots::after { content: ''; animation: dots 1.5s steps(3, end) infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }

  /* ── Keyboard (positioned via JS: bottom or top) ─────────────── */
  #keyboard {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    width: 620px;
    background: linear-gradient(135deg, rgba(28,28,28,0.96) 0%, rgba(38,38,38,0.94) 50%, rgba(28,28,28,0.96) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 12px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: opacity 0.3s, transform 0.3s;
  }
  /* Default: bottom of screen */
  #keyboard.pos-bottom { bottom: 20px; }
  #keyboard.pos-top { top: 20px; }
  #keyboard.hidden { opacity: 0; pointer-events: none; }
  #keyboard.hidden.pos-bottom { transform: translateX(-50%) translateY(20px); }
  #keyboard.hidden.pos-top { transform: translateX(-50%) translateY(-20px); }
  .row { display: flex; gap: 5px; justify-content: center; }
  .key {
    min-width: 52px; height: 52px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: rgba(255,255,255,0.9);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.05s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .key.selected {
    background: rgba(20,180,19,0.35);
    border-color: rgba(20,180,19,0.6);
    transform: scale(1.08);
    box-shadow: 0 0 16px rgba(20,180,19,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .key.pressed { background: rgba(20,180,19,0.7); transform: scale(0.95); }
  .key.wide { min-width: 80px; font-size: 14px; }
  .key.space { min-width: 320px; gap: 4px; }
  .key.shift { min-width: 90px; font-size: 14px; }
  .key.backspace { min-width: 90px; font-size: 14px; gap: 4px; }
  .key.enter { min-width: 100px; font-size: 14px; gap: 4px; }
  .key .btn-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    font-size: 10px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .btn-icon.x { background: rgba(0,120,212,0.7); }
  .btn-icon.y { background: rgba(212,166,0,0.7); }
  .btn-icon.g { background: rgba(80,80,80,0.6); border-radius: 4px; font-size: 9px; }
  .mic-icon { width: 14px; height: 14px; fill: rgba(255,255,255,0.8); flex-shrink: 0; }
  #preview { color: rgba(255,255,255,0.5); font-size: 14px; height: 24px; text-align: center; padding: 2px 0; }
  #hints {
    display: flex; gap: 12px; justify-content: center; padding: 6px 0 2px; flex-wrap: wrap;
  }
  .hint { display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.3); font-size: 10px; }
  .hb {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 3px; border-radius: 50%;
    font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.7);
  }
  .hb.x { background: rgba(0,120,212,0.4); }
  .hb.y { background: rgba(212,166,0,0.4); }
  .hb.b { background: rgba(196,43,28,0.4); }
  .hb.g { background: rgba(80,80,80,0.5); border-radius: 4px; font-size: 8px; }
</style>
</head>
<body>
<div id="voice-overlay"></div>
<div id="keyboard" class="pos-bottom">
  <div id="preview"></div>
  <div id="hints">
    <span class="hint"><span class="hb x">X</span> Bksp</span>
    <span class="hint"><span class="hb y">Y</span> Space</span>
    <span class="hint"><span class="hb g">LB</span> ←</span>
    <span class="hint"><span class="hb g">RB</span> →</span>
    <span class="hint"><span class="hb g">LT</span> Symbols</span>
    <span class="hint"><span class="hb g">⊙</span> Voice</span>
    <span class="hint"><span class="hb g">RT</span> Enter</span>
    <span class="hint"><span class="hb b">B</span> Close</span>
  </div>
</div>
<script>
const { ipcRenderer } = require('electron');
const path = require('path');

const MIC_SVG = '<svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';

// LT toggle symbols page
ipcRenderer.on('toggle-symbols', () => {
  symbolsMode = !symbolsMode;
  buildKeyboard();
  playSound('press');
});

// Play sounds via main process (paplay) — renderer audio is blocked in unfocused windows
function playSound(name) {
  process.stderr.write('[renderer] playSound: ' + name + '\n');
  ipcRenderer.send(name === 'move' ? 'play-move' : 'play-press');
}

process.stderr.write('[renderer] keyboard.html loaded\n');

const ROWS_LOWER = [
  ['1','2','3','4','5','6','7','8','9','0'],
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['Shift','z','x','c','v','b','n','m','Backspace'],
  ['Tab','MIC','Space','Enter'],
];
const ROWS_UPPER = [
  ['!','@','#','$','%','^','&','*','(',')'],
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Shift','Z','X','C','V','B','N','M','Backspace'],
  ['Tab','MIC','Space','Enter'],
];
const ROWS_SYMBOLS = [
  ['~','`','|','\\','{','}','[',']','<','>'],
  ['+','=','_','-','/','?',':',';','"','\''],
  ['!','@','#','$','%','^','&','*','(',')'],
  ['Shift',',','.','\u2026','\u2014','\u2018','\u2019','\u201C','Backspace'],
  ['Tab','MIC','Space','Enter'],
];
let symbolsMode = false;

let shifted = false, selRow = 1, selCol = 0, keys = [];
let voiceActive = false;
const kb = document.getElementById('keyboard');
const vo = document.getElementById('voice-overlay');

// Position keyboard based on where user is typing
ipcRenderer.on('kb-position', (event, pos) => {
  kb.classList.remove('pos-top', 'pos-bottom');
  kb.classList.add(pos === 'top' ? 'pos-top' : 'pos-bottom');
});

function currentRows() { return symbolsMode ? ROWS_SYMBOLS : (shifted ? ROWS_UPPER : ROWS_LOWER); }

function buildKeyboard() {
  const preview = document.getElementById('preview');
  const hints = document.getElementById('hints');
  kb.querySelectorAll('.row').forEach(r => r.remove());
  keys = [];
  const layout = currentRows();
  for (let r = 0; r < layout.length; r++) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row';
    keys[r] = [];
    for (let c = 0; c < layout[r].length; c++) {
      const label = layout[r][c];
      const el = document.createElement('div');
      el.className = 'key';
      if (label === 'Backspace') {
        el.classList.add('backspace');
        el.innerHTML = '<span class="btn-icon x">X</span> ⌫';
      } else if (label === 'Space') {
        el.classList.add('space');
        el.innerHTML = '<span class="btn-icon y">Y</span> Space';
      } else if (label === 'Enter') {
        el.classList.add('enter');
        el.innerHTML = '<span class="btn-icon g">RT</span> ↵';
      } else if (label === 'MIC') {
        el.classList.add('wide');
        el.innerHTML = '<span class="btn-icon g">⊙</span> ' + MIC_SVG;
        el.id = 'mic-key';
      } else {
        el.textContent = label;
      }
      if (label === 'Shift') el.classList.add('shift');
      if (label === 'Tab') el.classList.add('wide');
      keys[r][c] = el;
      rowDiv.appendChild(el);
    }
    kb.insertBefore(rowDiv, hints);
  }
  if (selRow >= keys.length) selRow = keys.length - 1;
  if (selCol >= keys[selRow].length) selCol = keys[selRow].length - 1;
  updateSelection();
}

function updateSelection() {
  for (let r = 0; r < keys.length; r++)
    for (let c = 0; c < keys[r].length; c++)
      keys[r][c].classList.remove('selected');
  keys[selRow][selCol].classList.add('selected');
}

function navigate(dr, dc) {
  const oldRow = selRow, oldCol = selCol;
  selRow = Math.max(0, Math.min(keys.length - 1, selRow + dr));
  selCol = Math.max(0, Math.min(keys[selRow].length - 1, selCol + dc));
  if (selRow !== oldRow || selCol !== oldCol) playSound('move');
  updateSelection();
}

function pressSelected() {
  const layout = currentRows();
  const label = layout[selRow][selCol];
  const el = keys[selRow][selCol];
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 120);
  playSound('press');
  if (label === 'Shift') { shifted = !shifted; buildKeyboard(); return; }
  if (label === 'MIC') return;
  ipcRenderer.send('type-key', label);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Voice dictation UI ──────────────────────────────────────────

function resetMicKey() {
  const mk = document.getElementById('mic-key');
  if (mk) { mk.style.background = ''; mk.style.borderColor = ''; }
}

ipcRenderer.on('voice-state', (event, state) => {
  const mk = document.getElementById('mic-key');
  if (state === 'recording') {
    voiceActive = true;
    kb.classList.add('hidden');
    if (mk) { mk.style.background = 'rgba(200,30,30,0.3)'; mk.style.borderColor = 'rgba(255,60,60,0.4)'; }
    vo.innerHTML = '<span class="rec-dot"></span> <span class="text" style="color:rgba(255,255,255,0.5)">Listening...</span> <span class="voice-hint">⊙ stop</span>';
    vo.className = 'visible';
  } else if (state === 'transcribing') {
    resetMicKey();
    vo.innerHTML = '<span class="text" style="color:rgba(100,170,255,0.8)">Processing...</span> <span class="cursor-blink"></span>';
  } else if (state === 'writing') {
    resetMicKey();
    vo.innerHTML = '<span class="text" style="color:#14b413"><span class="writing-dots">Writing</span></span>';
  }
});

ipcRenderer.on('voice-partial', (event, text) => {
  if (text) {
    vo.innerHTML = '<span class="rec-dot"></span> <span class="text">' +
      escapeHtml(text) + '</span><span class="cursor-blink"></span> <span class="voice-hint">⊙ stop</span>';
    vo.className = 'visible';
  }
});

ipcRenderer.on('voice-done', () => {
  voiceActive = false;
  resetMicKey();
  vo.className = '';
  kb.classList.remove('hidden');
});

// ── Gamepad polling ─────────────────────────────────────────────

const STICK_THRESHOLD = 0.4;
let stickHeld = { up: false, down: false, left: false, right: false };
let aHeld = false, bHeld = false;

let gpDebugCount = 0;
function pollGamepad() {
  const gamepads = navigator.getGamepads();
  let gp = null;
  for (const g of gamepads) { if (g && g.connected) { gp = g; break; } }
  if (!gp) {
    if (gpDebugCount++ % 100 === 0) console.error('[gp] no gamepad found, poll #' + gpDebugCount);
    return;
  }
  if (gpDebugCount < 3) { console.error('[gp] gamepad found: ' + gp.id); gpDebugCount = 100; }

  if (!voiceActive) {
    const lx = gp.axes[0] || 0, ly = gp.axes[1] || 0;
    const dUp = gp.buttons[12] && gp.buttons[12].pressed;
    const dDown = gp.buttons[13] && gp.buttons[13].pressed;
    const dLeft = gp.buttons[14] && gp.buttons[14].pressed;
    const dRight = gp.buttons[15] && gp.buttons[15].pressed;
    const up = ly < -STICK_THRESHOLD || dUp;
    const down = ly > STICK_THRESHOLD || dDown;
    const left = lx < -STICK_THRESHOLD || dLeft;
    const right = lx > STICK_THRESHOLD || dRight;

    if (up && !stickHeld.up) navigate(-1, 0);
    if (down && !stickHeld.down) navigate(1, 0);
    if (left && !stickHeld.left) navigate(0, -1);
    if (right && !stickHeld.right) navigate(0, 1);
    stickHeld = { up, down, left, right };

    const aPressed = gp.buttons[0] && gp.buttons[0].pressed;
    if (aPressed && !aHeld) pressSelected();
    aHeld = aPressed;
  }

  const bPressed = gp.buttons[1] && gp.buttons[1].pressed;
  if (bPressed && !bHeld) ipcRenderer.send('close-keyboard');
  bHeld = bPressed;
}

setInterval(pollGamepad, 50);
buildKeyboard();
</script>
</body>
</html>
