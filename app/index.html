<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Patatin</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="notification.css">
    </head>
    <body>
        <p id="fps"></p>

        <img src="" id="wallpaper-img" class="wallpaper" />
        <img src="" id="game-logo" class="game-logo" />
        <div id="dashboard">
            <div id="profile">
                <img id="profilepic">
                <div>
                    <h3 id="gamertag"></h3>
                    <p id="gamerdescription"></p>
                </div>
            </div>

            <p id="time"></p>

            <p id="jumpbackin">Jump back in</p>

            <div id="gamelist">
                <!-- Populated dynamically by xbox.js -->
            </div>

            <div id="utilityrow">
                <div class="utile green" id="util-mygames">
                    <svg class="utile-svg" viewBox="0 0 24 24" fill="white"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8V9zm0 3h4v2h-4v-2zm0-6h8v2h-8V6z"/></svg>
                    <span class="utile-label">My games<br>& apps</span>
                </div>
                <div class="utile featured" id="util-ea">
                    <div class="utile-featured-bg" id="util-ea-bg"></div>
                    <div class="utile-featured-content">
                        <span class="utile-tag">EA GAMES</span>
                        <span class="utile-label">Trending</span>
                    </div>
                </div>
            </div>

            <div id="buttonhints">
                <span class="hint"><svg class="hint-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg> More options</span>
                <span class="hint"><span class="btn-y">Y</span> Add to Play Later</span>
                <span class="hint"><svg class="hint-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg> Search</span>
            </div>
        </div>

        <!-- Game Context Menu (Start button) -->
        <div id="context-overlay" style="display:none">
            <div class="context-box">
                <h3 id="context-title"></h3>
                <div id="context-options"></div>
            </div>
        </div>

        <!-- Loading Overlay (shown while game is launching) -->
        <div id="loading-overlay" style="display:none">
            <img id="loading-bg" class="loading-bg" />
            <div class="loading-content">
                <img id="loading-logo" class="loading-logo" />
                <h2 id="loading-title"></h2>
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- Shutdown Overlay -->
        <div id="shutdown-overlay" style="display:none">
            <div class="shutdown-box">
                <h2>What would you like to do?</h2>
                <div class="shutdown-option selected" id="sd-close" data-action="close">Close Patatin</div>
                <div class="shutdown-option" id="sd-restart" data-action="restart">Restart PC</div>
                <div class="shutdown-option" id="sd-shutdown" data-action="shutdown">Shut down PC</div>
            </div>
        </div>

        <!-- My Games & Apps Overlay -->
        <div id="mygames-overlay" style="display:none">
            <div id="mygames-header">
                <h2>My games &amp; apps</h2>
                <div id="mygames-tabs">
                    <span class="mg-tab active" data-tab="installed">Installed</span>
                    <span class="mg-tab" data-tab="available">Available</span>
                </div>
            </div>
            <div id="mygames-grid"></div>
        </div>

        <script>window.$ = window.jQuery = require('jquery');</script>
        <script src="Controller.js"></script>
        <script src="Controller.layouts.js"></script>
        <script src="dom-navigator-1.0.3.min.js"></script>
        <script src="xbox.js"></script>
    </body>
</html>
